name: Daily Horizon Summary

# Fork-specific rationale, source inventory, query terms, and maintenance steps:
# HUMANOID_DIGEST.md. Keep this workflow and that document in sync.

on:
  schedule:
    # GitHub supports named time zones here; this is 08:00 in China year-round.
    - cron: '0 8 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:
    inputs:
      youtube_smoke_only:
        description: 'Only verify YOUTUBE_API_KEY; skip DeepSeek and publishing'
        required: false
        type: boolean
        default: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Verify YouTube Data API key
        # One minimal long-video search verifies that the key exists, YouTube
        # Data API v3 is enabled, and the key restriction permits this API.
        # The script never logs the key itself.
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # A dedicated smoke run must fail loudly. A normal digest should still
        # publish its news section if YouTube has a temporary outage.
        continue-on-error: ${{ inputs.youtube_smoke_only != true }}
        run: uv run python scripts/check_youtube_api.py

      - name: Prepare GitHub Actions config
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.youtube_smoke_only != true }}
        # Strict JSON cannot contain comments. Configuration rationale lives in
        # HUMANOID_DIGEST.md.
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.youtube_smoke_only != true }}
        env:
          # Store the value only in Settings > Secrets and variables > Actions.
          # Never commit the DeepSeek or YouTube API key to this repository.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # A 48-hour window reduces empty days in this narrow topic. Semantic
        # deduplication removes duplicate Chinese/English coverage within a run.
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.youtube_smoke_only != true }}
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.youtube_smoke_only != true }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
